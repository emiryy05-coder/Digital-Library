<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <title>Dijital Kütüphane</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer> </script>
</head>
<body id="login">



    <header>
        <h1 class="lh1 mt-4" id="hmph2"> <b>Dijital Kütüphane</b></h1>
    </header>
    

    <main>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="card rounded-4 mb-3" id="giriş1">
                    <div class="card-body p-4">
                        <h5 class="loginh5 mb-5">Sisteme Giriş Yapın</h5>
                        <div class="mb-5">
                            <div class="mb-5">
                                <label for="kAdi" class="label-form mb-1" style="margin: left;">Kullanıcı Adınız:</label>
                                <input type="text" name="kAdi" id="kAdi" class="form-control" placeholder="Kullanıcı Adınızı Giriniz...">
                            </div>
                            <div class="mb-5">
                                <label for="sifre" class="label-form mb-1" style="margin: left;">Şifreniz:</label>
                                <input type="password" class="form-control" id="sifre" placeholder="Şifrenizi Giriniz..">
                            </div>
                            <div class="mb-5">
                                <button class="form-submit" id="sbmt" onclick="girisYap()">Giriş Yap</button>
                                
                                <button class="submit" id="kayıt">Kayıt Ol</button>
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <hr>
        <p>© 2025</p>
        <p>Dijital Kütüphane</p>
    </footer>


 

</body>
</html>
